version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: book_gen_db
    environment:
      POSTGRES_DB: book_generator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: book_gen_app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/book_generator
      DATABASE_URL_SYNC: postgresql://postgres:postgres@db:5432/book_generator
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./output:/app/output
      - ./uploads:/app/uploads

volumes:
  postgres_data:
